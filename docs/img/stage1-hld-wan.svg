  <text x="290" y="48" text-anchor="middle" font-size="11" fill="#676C7E">Classification: Draft</text>

  <!-- lon-dc2 cloud node -->
  <g transform="translate(51, 90)">
    <path d="M 25 29 C 25 30 24 31 23 31 C 10 32 0 43 0 57 C 0 72 11 84 25 84 H 121 C 136 84 149 71 149 56 C 149 41 138 29 123 28 C 122 28 121 27 121 26 C 118 11 103 0 86 0 C 75 0 64 5 58 12 C 57 13 56 13 55 13 C 53 12 50 12 47 12 C 35 12 26 19 25 29 Z"
