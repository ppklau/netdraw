<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" font-family="system-ui,Arial,sans-serif">
  <!-- Background -->
  <rect width="760" height="380" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#0A0F25">Expanding an Existing Network — Overlay</text>
  <text x="380" y="48" text-anchor="middle" font-size="10" fill="#676C7E">Existing sites: active (full colour) · sin-dc1: concept overlay (dashed)</text>

  <!-- lon-dc1 container -->
  <rect x="15" y="80" width="200" height="140" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="115" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#0A0F25">lon-dc1</text>

  <!-- lon-dc1 border_router device at (115, 155) active — router icon -->
  <g transform="translate(115, 155)">
    <g transform="scale(0.667) translate(-24,-24)" fill="none" stroke="#455A64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="24" r="16"/>
      <path d="M12 24h24M15 21l-3 3 3 3M33 21l3 3-3 3"/>
      <path d="M24 12v24M21 15l3-3 3 3M21 33l3 3 3-3"/>
    </g>
    <text x="0" y="28" text-anchor="middle" font-size="8" fill="#0A0F25">lon-dc1-border-01</text>
    <text x="0" y="37" text-anchor="middle" font-size="7" fill="#676C7E">border_router · arista</text>
  </g>

  <!-- nyc-dc1 container -->
  <rect x="15" y="250" width="200" height="110" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="115" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#0A0F25">nyc-dc1</text>

  <!-- nyc-dc1 border_router device at (115, 315) active — router icon -->
  <g transform="translate(115, 315)">
    <g transform="scale(0.667) translate(-24,-24)" fill="none" stroke="#455A64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="24" r="16"/>
      <path d="M12 24h24M15 21l-3 3 3 3M33 21l3 3-3 3"/>
      <path d="M24 12v24M21 15l3-3 3 3M21 33l3 3 3-3"/>
    </g>
    <text x="0" y="28" text-anchor="middle" font-size="8" fill="#0A0F25">nyc-dc1-border-01</text>
    <text x="0" y="37" text-anchor="middle" font-size="7" fill="#676C7E">border_router · arista</text>
  </g>

  <!-- WAN links (concept style: stroke=#B0BEC5, width=1, dasharray="3 3") -->
  <!-- sin-dc1 border_router → lon-dc1 border-01 -->
  <line x1="475" y1="117" x2="215" y2="155"
        stroke="#B0BEC5" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- sin-dc1 border_router → nyc-dc1 border-01 -->
  <line x1="475" y1="117" x2="215" y2="315"
        stroke="#B0BEC5" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- sin-dc1 container (concept overlay) -->
  <rect x="450" y="60" width="295" height="295" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="597" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#0A0F25">sin-dc1</text>

  <!-- sin-dc1 concept annotation -->
  <text x="597" y="342" text-anchor="middle" font-size="9" fill="#90A4AE">concept overlay</text>

  <!-- sin-dc1: border_router ×2 -->
  <rect x="475" y="95" width="245" height="44" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="597" y="120" text-anchor="middle" font-size="11" fill="#78909C">border_router ×2</text>

  <!-- sin-dc1: spine ×4 -->
  <rect x="475" y="170" width="245" height="44" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="597" y="195" text-anchor="middle" font-size="11" fill="#78909C">spine ×4</text>

  <!-- sin-dc1: leaf ×16 -->
  <rect x="475" y="245" width="245" height="44" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="597" y="270" text-anchor="middle" font-size="11" fill="#78909C">leaf ×16</text>
</svg>
