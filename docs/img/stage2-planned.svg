<svg xmlns="http://www.w3.org/2000/svg" width="520" height="310" font-family="system-ui,Arial,sans-serif">
  <!-- Background -->
  <rect width="520" height="310" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="260" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#0A0F25">lon-dc2 — Site Fabric (planned)</text>
  <text x="260" y="46" text-anchor="middle" font-size="10" fill="#676C7E">status: planned — devices at 55% opacity, no interface labels</text>

  <!-- Site container -->
  <rect x="15" y="55" width="490" height="240" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
  <text x="260" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#0A0F25">lon-dc2</text>

  <!-- Fabric links (planned: stroke=#90A4AE, width=1, dasharray="5 5") -->
  <!-- Drawn before devices so devices appear on top -->
  <!-- spine bottom ≈ 142 (135+7), leaf top ≈ 236 (240-4) -->
  <line x1="120" y1="142" x2="120" y2="236"
        stroke="#90A4AE" stroke-width="1" stroke-dasharray="5 5" stroke-linecap="round"/>
  <line x1="120" y1="142" x2="400" y2="236"
        stroke="#90A4AE" stroke-width="1" stroke-dasharray="5 5" stroke-linecap="round"/>
  <line x1="400" y1="142" x2="120" y2="236"
        stroke="#90A4AE" stroke-width="1" stroke-dasharray="5 5" stroke-linecap="round"/>
  <line x1="400" y1="142" x2="400" y2="236"
        stroke="#90A4AE" stroke-width="1" stroke-dasharray="5 5" stroke-linecap="round"/>

  <!-- lon-dc2-spine-01 at (120, 135) opacity 0.55 — layer3-switch icon -->
  <g transform="translate(120, 135)" opacity="0.55">
    <g transform="scale(0.667) translate(-24,-24)" fill="none" stroke="#455A64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="20" width="36" height="14" rx="2"/>
      <path d="M12 30h3M19 30h3M26 30h3M33 30h3"/>
      <path d="M8 14h22V8"/>
      <path d="M27 11l3-3 3 3"/>
    </g>
    <text x="0" y="28" text-anchor="middle" font-size="9" fill="#0A0F25">lon-dc2-spine-01</text>
    <text x="0" y="38" text-anchor="middle" font-size="8" fill="#676C7E">spine · arista</text>
  </g>

  <!-- lon-dc2-spine-02 at (400, 135) opacity 0.55 — layer3-switch icon -->
  <g transform="translate(400, 135)" opacity="0.55">
    <g transform="scale(0.667) translate(-24,-24)" fill="none" stroke="#455A64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="20" width="36" height="14" rx="2"/>
      <path d="M12 30h3M19 30h3M26 30h3M33 30h3"/>
      <path d="M8 14h22V8"/>
      <path d="M27 11l3-3 3 3"/>
    </g>
    <text x="0" y="28" text-anchor="middle" font-size="9" fill="#0A0F25">lon-dc2-spine-02</text>
    <text x="0" y="38" text-anchor="middle" font-size="8" fill="#676C7E">spine · arista</text>
  </g>

  <!-- lon-dc2-leaf-01 at (120, 240) opacity 0.55 — layer2-switch icon -->
  <g transform="translate(120, 240)" opacity="0.55">
    <g transform="scale(0.667) translate(-24,-24)" fill="none" stroke="#455A64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="18" width="36" height="14" rx="2"/>
      <path d="M12 28h3M19 28h3M26 28h3M33 28h3"/>
      <path d="M16 11h16M19 8l-3 3 3 3M29 8l3 3-3 3"/>
    </g>
    <text x="0" y="28" text-anchor="middle" font-size="9" fill="#0A0F25">lon-dc2-leaf-01</text>
    <text x="0" y="38" text-anchor="middle" font-size="8" fill="#676C7E">leaf · arista</text>
  </g>

  <!-- lon-dc2-leaf-02 at (400, 240) opacity 0.55 — layer2-switch icon -->
  <g transform="translate(400, 240)" opacity="0.55">
    <g transform="scale(0.667) translate(-24,-24)" fill="none" stroke="#455A64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="18" width="36" height="14" rx="2"/>
      <path d="M12 28h3M19 28h3M26 28h3M33 28h3"/>
      <path d="M16 11h16M19 8l-3 3 3 3M29 8l3 3-3 3"/>
    </g>
    <text x="0" y="28" text-anchor="middle" font-size="9" fill="#0A0F25">lon-dc2-leaf-02</text>
    <text x="0" y="38" text-anchor="middle" font-size="8" fill="#676C7E">leaf · arista</text>
  </g>
</svg>
